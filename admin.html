<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم شام نت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0B0E23; --card: #151A35; --blue: #00D9FF; --text: #fff; --text2: #B8C5D6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Cairo", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 32px; margin-bottom: 30px; color: var(--blue); }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--card); }
        .tab { padding: 15px 30px; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; }
        .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid rgba(0, 217, 255, 0.2); }
        .card h3 { color: var(--blue); margin-bottom: 15px; }
        .card input, .card textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(0, 217, 255, 0.3); background: var(--bg); color: var(--text); font-family: "Cairo"; }
        .card textarea { min-height: 80px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: "Cairo"; }
        .btn-primary { background: var(--blue); color: var(--bg); }
        .btn-danger { background: #FF2E63; color: white; }
        .btn-success { background: #00FF88; color: var(--bg); }
        .btn:hover { opacity: 0.8; }
        table { width: 100%; background: var(--card); border-radius: 15px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { background: rgba(0, 217, 255, 0.1); color: var(--blue); font-weight: 700; }
        .status { padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .status.new { background: #FF2E63; }
        .status.contacted { background: #FFA500; color: #000; }
        .status.done { background: #00FF88; color: #000; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .login { max-width: 400px; margin: 100px auto; background: var(--card); padding: 40px; border-radius: 20px; }
        .login input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid rgba(0, 217, 255, 0.3); background: var(--bg); color: var(--text); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid rgba(0, 217, 255, 0.2); }
        .stat-card h2 { font-size: 36px; color: var(--blue); margin-bottom: 5px; }
        .stat-card p { color: var(--text2); }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } th, td { padding: 10px 5px; font-size: 14px; } }
    </style>
</head>
<body>
    <div id="loginScreen" class="login">
        <h1 style="text-align: center;"><i class="fa-solid fa-satellite-dish"></i> لوحة تحكم شام نت</h1><input type="password" id="adminPass" placeholder="كلمة السر">
        <button class="btn btn-primary" id="loginBtn" style="width: 100%;">دخول</button>
        <p id="loginMsg" style="text-align: center; margin-top: 15px; color: #FF2E63;"></p>
    </div>

    <div id="dashboard" class="container" style="display: none;">
        <h1><i class="fa-solid fa-satellite-dish"></i> لوحة تحكم شام نت</h1>
        
        <div class="stats">
            <div class="stat-card"><h2 id="totalOrders">0</h2><p>إجمالي الطلبات</p></div>
            <div class="stat-card"><h2 id="newOrders">0</h2><p>طلبات جديدة</p></div>
            <div class="stat-card"><h2 id="totalPackages">0</h2><p>عدد الباقات</p></div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="packages"><i class="fa-solid fa-box"></i> إدارة الباقات</button>
            <button class="tab" data-tab="orders"><i class="fa-solid fa-list"></i> الطلبات الجديدة</button>
        </div>

        <div id="packages" class="tab-content active">
            <button class="btn btn-primary" id="addPackageBtn" style="margin-bottom: 20px;">+ إضافة باقة جديدة</button>
            <div class="grid" id="packagesGrid"></div>
        </div>

        <div id="orders" class="tab-content">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th><th>الموبايل</th><th>المدينة</th><th>الباقة</th><th>السعر</th><th>التاريخ</th><th>الحالة</th><th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // الكونفيج تبعك صار محطوط
        const firebaseConfig = {
            apiKey: "AIzaSyAg0LGjb6rcMlMZUn15R73_pX2VXBOp0Xc",
            authDomain: "syriastore1-dcee8.firebaseapp.com",
            projectId: "syriastore1-dcee8",
            storageBucket: "syriastore1-dcee8.firebasestorage.app",
            messagingSenderId: "938774399039",
            appId: "1:938774399039:web:72d8b51051043b69a6d08a",
            measurementId: "G-BSKKDDMWVH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_PASSWORD = "kali";

        document.getElementById('loginBtn').addEventListener('click', checkLogin);
        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLogin();
        });

        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            const msg = document.getElementById('loginMsg');
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initDashboard();
            } else {
                msg.textContent = 'كلمة السر غلط';
            }
        }

        function initDashboard() {
            document.querySelectorAll('.tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });

            document.getElementById('addPackageBtn').addEventListener('click', showAddPackage);
            
            loadPackages();
            loadOrders();
        }

        async function loadPackages() {
            try {
                const querySnapshot = await getDocs(collection(db, "packages"));
                const grid = document.getElementById('packagesGrid');
                grid.innerHTML = '';
                let count = 0;
                querySnapshot.forEach((docSnap) => {
                    count++;
                    const pkg = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${pkg.name} ${pkg.featured ? '⭐' : ''}</h3>
                        <input type="text" value="${pkg.name}" data-field="name" placeholder="اسم الباقة">
                        <input type="number" value="${pkg.price}" data-field="price" placeholder="السعر">
                        <input type="number" value="${pkg.speed}" data-field="speed" placeholder="السرعة Mbps">
                        <textarea data-field="features" placeholder="المميزات - كل ميزة بسطر">${pkg.features.join('\n')}</textarea>
                        <label><input type="checkbox" data-field="featured" ${pkg.featured ? 'checked' : ''}> الأكثر طلباً</label>
                        <div style="display: flex; gap: 10px; margin-top: 15px;">
                            <button class="btn btn-primary" data-action="save">حفظ</button>
                            <button class="btn btn-danger" data-action="delete">حذف</button>
                        </div>
                    `;
                    card.querySelector('[data-action="save"]').addEventListener('click', () => updatePackage(docSnap.id, card));
                    card.querySelector('[data-action="delete"]').addEventListener('click', () => deletePackage(docSnap.id));
                    grid.appendChild(card);
                });
                document.getElementById('totalPackages').textContent = count;
            } catch (e) {
                console.error(e);
                alert('تأكد من تفعيل Firestore Database + القواعد');
            }
        }

        function showAddPackage() {
            const grid = document.getElementById('packagesGrid');
            const card = document.createElement('div');
            card.className = 'card';
            card.style.border = '2px solid var(--blue)';
            card.innerHTML = `
                <h3>باقة جديدة</h3>
                <input type="text" id="new-name" placeholder="اسم الباقة">
                <input type="number" id="new-price" placeholder="السعر $">
                <input type="number" id="new-speed" placeholder="السرعة Mbps">
                <textarea id="new-features" placeholder="المميزات - كل ميزة بسطر"></textarea>
                <label><input type="checkbox" id="new-featured"> الأكثر طلباً</label>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-success" id="saveNewPkg">إضافة</button>
                    <button class="btn btn-danger" id="cancelNewPkg">إلغاء</button>
                </div>
            `;
            grid.prepend(card);
            card.querySelector('#saveNewPkg').addEventListener('click', addPackage);
            card.querySelector('#cancelNewPkg').addEventListener('click', loadPackages);
        }

        async function addPackage() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const speed = document.getElementById('new-speed').value;
            if (!name || !price || !speed) return alert('عبي كل الحقول');
            
            await addDoc(collection(db, "packages"), {
                name: name,
                price: Number(price),
                speed: Number(speed),
                features: document.getElementById('new-features').value.split('\n').filter(f => f.trim()),
                featured: document.getElementById('new-featured').checked
            });
            loadPackages();
        }

        async function updatePackage(id, card) {
            await updateDoc(doc(db, "packages", id), {
                name: card.querySelector('[data-field="name"]').value,
                price: Number(card.querySelector('[data-field="price"]').value),
                speed: Number(card.querySelector('[data-field="speed"]').value),
                features: card.querySelector('[data-field="features"]').value.split('\n').filter(f => f.trim()),
                featured: card.querySelector('[data-field="featured"]').checked
            });
            alert('تم الحفظ');
            loadPackages();
        }

        async function deletePackage(id) {
            if (confirm('متأكد من حذف الباقة؟')) {
                await deleteDoc(doc(db, "packages", id));
                loadPackages();
            }
        }

        function loadOrders() {
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const table = document.getElementById('ordersTable');
                table.innerHTML = '';
                let total = 0, newCount = 0;
                snapshot.forEach((docSnap) => {
                    total++;
                    const order = docSnap.data();
                    if (order.status === 'جديد') newCount++;
                    
                    const date = order.createdAt ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('ar') : '-';
                    const statusClass = order.status === 'جديد' ? 'new' : order.status === 'تم التواصل' ? 'contacted' : 'done';
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${order.name}</td>
                        <td><a href="tel:${order.phone}" style="color: var(--blue);">${order.phone}</a></td>
                        <td>${order.city}</td>
                        <td>${order.packageName} - ${order.packageSpeed} Mbps</td>
                        <td>$${order.packagePrice}</td>
                        <td>${date}</td>
                        <td><span class="status ${statusClass}">${order.status}</span></td>
                        <td class="actions">
                            <button class="btn btn-primary" data-status="تم التواصل">تواصلت</button>
                            <button class="btn btn-success" data-status="تم التركيب">تم</button>
                            <button class="btn btn-danger" data-action="delete">حذف</button>
                        </td>
                    `;
                    row.querySelector('[data-status="تم التواصل"]').addEventListener('click', () => updateOrderStatus(docSnap.id, 'تم التواصل'));
                    row.querySelector('[data-status="تم التركيب"]').addEventListener('click', () => updateOrderStatus(docSnap.id, 'تم التركيب'));
                    row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteOrder(docSnap.id));
                    table.appendChild(row);
                });
                document.getElementById('totalOrders').textContent = total;
                document.getElementById('newOrders').textContent = newCount;
            });
        }

        async function updateOrderStatus(id, status) {
            await updateDoc(doc(db, "orders", id), { status: status });
        }

        async function deleteOrder(id) {
            if (confirm('متأكد من حذف الطلب؟')) {
                await deleteDoc(doc(db, "orders", id));
            }
        }
    </script>
</body>
</html>
