<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شام نت - إنترنت فضائي بسرعة الضوء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(180deg, #0a192f 0%, #112240 100%); color: #fff; min-height: 100vh; }
        .navbar { background: rgba(10, 25, 47, 0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: #ccd6f6; text-decoration: none; font-size: 18px; }
        .nav-links a:hover { color: #64ffda; }
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .title { text-align: center; font-size: 42px; margin-bottom: 40px; }
        .title span { color: #64ffda; }
        #packages-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .package-card { background: rgba(17, 34, 64, 0.8); border: 1px solid #233554; border-radius: 15px; padding: 30px; text-align: center; transition: 0.3s; }
        .package-card:hover { transform: translateY(-10px); border-color: #64ffda; }
        .package-name { font-size: 24px; color: #64ffda; margin-bottom: 15px; }
        .package-price { font-size: 36px; margin-bottom: 15px; }
        .package-price span { font-size: 16px; color: #8892b0; }
        .package-speed { font-size: 18px; color: #ccd6f6; margin-bottom: 20px; }
        .features-list { list-style: none; text-align: right; margin-bottom: 25px; }
        .features-list li { margin-bottom: 10px; color: #8892b0; }
        .features-list li::before { content: "✓"; color: #64ffda; margin-left: 10px; }
        .btn { background: #64ffda; color: #0a192f; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        .loading { text-align: center; font-size: 20px; color: #8892b0; grid-column: 1 / -1; }
        .error { color: #ff6b6b; text-align: center; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">شام نت</div>
        <ul class="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">المميزات</a></li>
            <li><a href="#">الباقات</a></li>
            <li><a href="#">اطلب الآن</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="title">باقاتنا <span>للبيوت</span></h1>
        <div id="packages-container">
            <p class="loading">جاري تحميل الباقات...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        // الكونفيج تبعك محطوط جاهز
        const firebaseConfig = {
            apiKey: "AIzaSyAg0LGjb6rcMlMZUn15R73_pX2VXBOp0Xc",
            authDomain: "syriastore1-dcee8.firebaseapp.com",
            projectId: "syriastore1-dcee8",
            storageBucket: "syriastore1-dcee8.firebasestorage.app",
            messagingSenderId: "938774399039",
            appId: "1:938774399039:web:72d8b51051043b69a6d08a",
            measurementId: "G-BSKKDDMWVH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const packagesContainer = document.getElementById('packages-container');

        async function loadPackages() {try {
                const querySnapshot = await getDocs(collection(db, "packages"));
                
                console.log("عدد الباقات اللي لقيتها:", querySnapshot.size);
                
                if (querySnapshot.empty) {
                    packagesContainer.innerHTML = '<p class="loading">لا توجد باقات متاحة حالياً</p>';
                    return;
                }

                packagesContainer.innerHTML = '';
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    console.log(doc.id, " => ", data);
                    
                    const card = document.createElement('div');
                    card.className = 'package-card';
                    
                    let featuresHTML = '';
                    if (data.features && Array.isArray(data.features)) {
                        featuresHTML = '<ul class="features-list">' + data.features.map(f => <li>${f}</li>).join('') + '</ul>';
                    }

                    card.innerHTML = 
                        <h3 class="package-name">${data.name || 'باقة بدون اسم'}</h3>
                        <div class="package-price">${data.price || 0} <span>ل.س / شهرياً</span></div>
                        <div class="package-speed">السرعة: ${data.speed || 0} Mbps</div>
                        ${featuresHTML}
                        <button class="btn">اطلب الآن</button>
                    ;
                    packagesContainer.appendChild(card);
                });

            } catch (error) {
                console.error("خطأ في جلب الباقات:", error);
                packagesContainer.innerHTML = <p class="error">صار خطأ: ${error.message}<br>تأكد من الـ Rules والدومين</p>;
            }
        }

        loadPackages();
    </script>
</body>
</html>
